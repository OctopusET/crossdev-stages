BOARD_NAME="vsrves01"
BOARD_ARCH="riscv32"
BOARD_CFLAGS="-Os -march=rv32ima_zicsr_zifencei -mabi=ilp32 -mcmodel=medlow -pipe"
BOARD_GCC_VERSION="16.1.0"
CROSS_COMPILE="riscv32-unknown-linux-musl-"
KERNEL_ARCH="riscv"

KERNEL_REPO="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
KERNEL_TAG="v6.18.36"
KERNEL_DEFCONFIG="vsrves01_defconfig"
BOOT_KERNEL_NAME="Image.vri"
BOARD_DTB_GLOB="arch/riscv/boot/dts/vlsi/vsrves01-catboard.dtb"

BOOT_CONSOLE="ttyUL0,1000000"
BOOT_HOSTNAME="vsrves01"
BOOT_SERIAL_TTY="ttyUL0"
BOOT_SERIAL_BAUD="1000000"

# VSDSP6 owns boot — no u-boot, no OpenSBI.  pack stages rvlbne.bin +
# vsrves01-catboard.dtb + linux61.vri + startup.txt onto a FAT32 SD card.
BUILD_STEPS=(deps checkout kernel assemble pack)

BOOT_SERVICES=()
