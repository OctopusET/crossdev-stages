config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

# Superfloppy FAT32 - no MBR/GPT partition table.  The VSDSP6 boot ROM /
# VSOS reads the SD as one FAT volume from sector 0; it does not walk an
# MBR partition table.  Everything (boot blobs, kernel VRI, dtb, plus the
# stage-2 rootfs as a regular file rootfs.ext4) lives inside this FAT.
#
# Stage-2 init attaches /boot/rootfs.ext4 via /dev/loop0 and switch_roots.
# First boot grows rootfs.ext4 to fill the remaining FAT free space.
image gentoo-linux-vsrves01_dev-sdcard.img {
    vfat {
        extraargs = "-F 32"
        label = "VSRV-LINUX"
    }
    size = 256M
    mountpoint = "/boot"
}
