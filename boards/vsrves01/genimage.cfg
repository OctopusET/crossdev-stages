config {
    outputpath = .
    inputpath = .
    rootpath = gen
    tmppath = tmp
}

# Superfloppy FAT16 — no MBR/GPT.  VSDSP6 boot ROM reads sector 0 as FAT
# BPB.  Vendor's own driver was developed against FAT16 (see Card-stuck
# failure when given FAT32 on an SDSC card), so we match.
#
# Initramfs-only architecture: linux61.vri carries the embedded cpio
# (busybox + /init + 110 MiB squashfs of the Gentoo rootfs).  The cpio
# is XZ-wrapped by the kernel but the squashfs inside is already gzip-
# compressed → no further compression gain, vri ends up ~120 MiB.  We
# size the FAT partition to 200 MiB to leave headroom; a 256 MB SDSC
# card has ~244 MiB usable.  For a tighter image, rebuild with smaller
# @world (drop python/perl/gcc from the squashfs source tree).
image gentoo-linux-vsrves01_dev-sdcard.img {
    vfat {
        extraargs = "-F 16"
        label = "VSRV-LINUX"
    }
    size = 200M
    mountpoint = "/boot"
}
